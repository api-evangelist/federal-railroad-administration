naftiko: 1.0.0-alpha2
info:
  label: Federal Railroad Administration Public API
  description: 'Federal Railroad Administration Public API. 5 operations. Lead operation: Retrieve railroad accident records.
    Self-contained Naftiko capability covering one Federal Railroad Administration business surface.'
  tags:
  - Federal Railroad Administration
  - Federal Railroad Administration Public API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FEDERAL_RAILROAD_ADMINISTRATION_API_KEY: FEDERAL_RAILROAD_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: federal-railroad-administration
    baseUri: https://safetydata.fra.dot.gov/MasterWebService/publicapi
    description: Federal Railroad Administration Public API business capability. Self-contained, no shared references.
    resources:
    - name: accidents
      path: /accidents
      operations:
      - name: listaccidents
        method: GET
        description: Retrieve railroad accident records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: year
          in: query
          type: integer
        - name: railroad
          in: query
          type: string
    - name: crossings
      path: /crossings
      operations:
      - name: listcrossings
        method: GET
        description: Retrieve highway-rail grade crossing inventory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
    - name: incidents
      path: /incidents
      operations:
      - name: listincidents
        method: GET
        description: Retrieve railroad incident records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: year
          in: query
          type: integer
    - name: inspections
      path: /inspections
      operations:
      - name: listinspections
        method: GET
        description: Retrieve FRA inspection records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: operational-data
      path: /operational-data
      operations:
      - name: listoperationaldata
        method: GET
        description: Retrieve railroad operational data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: federal-railroad-administration-rest
    port: 8080
    description: REST adapter for Federal Railroad Administration Public API. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accidents
      name: accidents
      description: REST surface for accidents.
      operations:
      - method: GET
        name: listaccidents
        description: Retrieve railroad accident records
        call: federal-railroad-administration.listaccidents
        with:
          year: rest.year
          railroad: rest.railroad
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crossings
      name: crossings
      description: REST surface for crossings.
      operations:
      - method: GET
        name: listcrossings
        description: Retrieve highway-rail grade crossing inventory
        call: federal-railroad-administration.listcrossings
        with:
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/incidents
      name: incidents
      description: REST surface for incidents.
      operations:
      - method: GET
        name: listincidents
        description: Retrieve railroad incident records
        call: federal-railroad-administration.listincidents
        with:
          year: rest.year
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/inspections
      name: inspections
      description: REST surface for inspections.
      operations:
      - method: GET
        name: listinspections
        description: Retrieve FRA inspection records
        call: federal-railroad-administration.listinspections
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/operational-data
      name: operational-data
      description: REST surface for operational-data.
      operations:
      - method: GET
        name: listoperationaldata
        description: Retrieve railroad operational data
        call: federal-railroad-administration.listoperationaldata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: federal-railroad-administration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Federal Railroad Administration Public API. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: retrieve-railroad-accident-records
      description: Retrieve railroad accident records
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: federal-railroad-administration.listaccidents
      with:
        year: tools.year
        railroad: tools.railroad
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-highway-rail-grade-crossing
      description: Retrieve highway-rail grade crossing inventory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: federal-railroad-administration.listcrossings
      with:
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-railroad-incident-records
      description: Retrieve railroad incident records
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: federal-railroad-administration.listincidents
      with:
        year: tools.year
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-fra-inspection-records
      description: Retrieve FRA inspection records
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: federal-railroad-administration.listinspections
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-railroad-operational-data
      description: Retrieve railroad operational data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: federal-railroad-administration.listoperationaldata
      outputParameters:
      - type: object
        mapping: $.
